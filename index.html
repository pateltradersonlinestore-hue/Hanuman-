<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vedika LIVE - Premium AI Core</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 🌌 Deep Space Vibrant Background */
        body {
            margin: 0;
            padding: 0;
            background-color: #020204;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, sans-serif;
            height: 100vh;
            overflow: hidden;
            position: relative;
            background: radial-gradient(circle at 50% 50%, #0a0a1a 0%, #020204 100%);
        }

        /* 🌟 3D Canvas */
        #starfield {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        /* 🍎 Premium Glassmorphism */
        .glass-layer {
            position: relative;
            z-index: 10;
            background: rgba(15, 15, 20, 0.45);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 15px 50px rgba(0, 0, 0, 0.7);
        }

        .glow-text { text-shadow: 0 0 20px rgba(0, 242, 254, 0.6); }
        .text-gradient {
            background: linear-gradient(135deg, #00f2fe, #4facfe, #fe0979);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .main-wrapper {
            display: flex;
            flex-direction: column;
            height: 100vh;
            max-width: 1200px;
            margin: 0 auto;
        }

        /* 🤖 Rotating AI Logo Core */
        .ai-core-container {
            position: relative;
            width: 120px;
            height: 120px;
            margin: 0 auto 30px auto;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .ai-core-ring-1 {
            position: absolute; width: 100%; height: 100%;
            border: 2px dashed rgba(0, 242, 254, 0.6);
            border-radius: 50%;
            animation: spin-slow 10s linear infinite;
        }
        .ai-core-ring-2 {
            position: absolute; width: 80%; height: 80%;
            border: 2px solid transparent;
            border-top: 2px solid #fe0979;
            border-bottom: 2px solid #ffaa00;
            border-radius: 50%;
            animation: spin-reverse 6s linear infinite;
        }
        .ai-core-center {
            position: absolute; width: 40%; height: 40%;
            background: radial-gradient(circle, #ffffff 0%, #00f2fe 50%, transparent 100%);
            border-radius: 50%;
            box-shadow: 0 0 30px #00f2fe, 0 0 60px #fe0979;
            animation: pulse-core 2s ease-in-out infinite;
        }

        @keyframes spin-slow { 100% { transform: rotate(360deg); } }
        @keyframes spin-reverse { 100% { transform: rotate(-360deg); } }
        @keyframes pulse-core { 0%, 100% { transform: scale(1); opacity: 0.8; } 50% { transform: scale(1.2); opacity: 1; } }

        /* 💬 Subtitles (Hidden by default) */
        .chat-container { 
            flex-grow: 1; 
            overflow-y: auto; 
            padding: 20px; 
            display: flex; 
            flex-direction: column; 
            gap: 20px; 
            scroll-behavior: smooth;
            opacity: 0;
            pointer-events: none;
            transform: translateY(20px) scale(0.98);
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .chat-container.show-subtitles {
            opacity: 1;
            pointer-events: auto;
            transform: translateY(0) scale(1);
        }

        .chat-container::-webkit-scrollbar { width: 4px; }
        .chat-container::-webkit-scrollbar-thumb { background: rgba(0, 242, 254, 0.4); border-radius: 10px; }

        .message { max-width: 90%; padding: 16px 24px; border-radius: 20px; font-size: 1.05rem; line-height: 1.6; letter-spacing: 0.3px;}
        @media (min-width: 768px) { .message { max-width: 75%; } }
        
        .msg-user { align-self: flex-end; background: linear-gradient(135deg, rgba(0, 242, 254, 0.1), rgba(0, 242, 254, 0.02)); border: 1px solid rgba(0, 242, 254, 0.3); color: #fff; border-bottom-right-radius: 4px;}
        .msg-ai { align-self: flex-start; background: linear-gradient(135deg, rgba(254, 9, 121, 0.1), rgba(254, 9, 121, 0.02)); border: 1px solid rgba(254, 9, 121, 0.3); color: #fff; border-bottom-left-radius: 4px;}

        /* 🎛️ Mic Controls */
        .mic-btn { 
            background: linear-gradient(135deg, #151520, #0a0a10); 
            border: 2px solid rgba(255, 255, 255, 0.1); 
            color: #fff; 
            border-radius: 50%; 
            width: 85px; 
            height: 85px; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            cursor: pointer; 
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            position: relative;
            z-index: 30;
        }
        @media (min-width: 768px) { .mic-btn { width: 95px; height: 95px; } }

        .mic-btn:hover { transform: scale(1.05); border-color: rgba(0, 242, 254, 0.5); }
        .mic-btn.recording { 
            background: linear-gradient(135deg, #ff0844, #ffb199); 
            border-color: #ff0844;
            box-shadow: 0 0 35px rgba(255, 8, 68, 0.6);
            animation: pulse-red 1.5s infinite;
        }
        
        .progress-ring {
            position: absolute;
            top: -5px; left: -5px; right: -5px; bottom: -5px;
            border-radius: 50%;
            border: 2px solid transparent;
            border-top-color: #00f2fe;
            border-bottom-color: #fe0979;
            opacity: 0;
            transition: transform 0.1s linear;
        }
        .mic-btn.recording .progress-ring { opacity: 1; animation: spin 2s linear infinite; }

        @keyframes pulse-red { 0% { box-shadow: 0 0 0 0 rgba(255, 8, 68, 0.6); } 70% { box-shadow: 0 0 0 20px rgba(255, 8, 68, 0); } 100% { box-shadow: 0 0 0 0 rgba(255, 8, 68, 0); } }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        /* 🎛️ Colorful Waveform Animation (Morphing) */
        .waveform { display: flex; align-items: center; justify-content: center; gap: 5px; height: 40px; }
        .waveform .bar { width: 5px; border-radius: 3px; animation: bounce 1s infinite ease-in-out; }
        .waveform .bar:nth-child(1) { height: 15px; background: #00f2fe; animation-delay: 0s; }
        .waveform .bar:nth-child(2) { height: 30px; background: #4facfe; animation-delay: 0.2s; }
        .waveform .bar:nth-child(3) { height: 45px; background: #fe0979; animation-delay: 0.4s; }
        .waveform .bar:nth-child(4) { height: 30px; background: #ffaa00; animation-delay: 0.6s; }
        .waveform .bar:nth-child(5) { height: 15px; background: #00f2fe; animation-delay: 0.8s; }

        @keyframes bounce { 0%, 100% { transform: scaleY(0.5); } 50% { transform: scaleY(1.3); box-shadow: 0 0 15px currentColor; } }

        .icon-transition { transition: opacity 0.3s ease, transform 0.3s ease; }
        .hidden-icon { opacity: 0; position: absolute; pointer-events: none; transform: scale(0.5); }

        /* 🎬 Screens */
        #intro-screen {
            position: absolute; inset: 0; z-index: 50;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            background: rgba(2, 2, 4, 0.9);
            backdrop-filter: blur(15px);
            transition: opacity 0.6s ease;
        }
        
        .start-btn {
            background: linear-gradient(135deg, #00f2fe, #4facfe);
            color: #000;
            font-weight: 800;
            font-size: 1.2rem;
            letter-spacing: 2px;
            padding: 16px 45px;
            border-radius: 50px;
            border: none;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(0, 242, 254, 0.4);
            transition: all 0.3s;
            text-transform: uppercase;
        }
        .start-btn:hover { transform: translateY(-3px) scale(1.05); box-shadow: 0 15px 40px rgba(0, 242, 254, 0.6); background: linear-gradient(135deg, #fe0979, #ffaa00); color: white;}

        .hidden-screen { opacity: 0; pointer-events: none; }
        
        /* Status Text */
        .status-display {
            font-size: 1.1rem;
            font-weight: 600;
            letter-spacing: 1.5px;
            height: 28px;
            color: #00f2fe;
            transition: opacity 0.3s;
            text-align: center;
            text-shadow: 0 0 10px rgba(0, 242, 254, 0.5);
        }

        /* Control Buttons */
        .control-btns-wrapper { display: flex; gap: 15px; margin-bottom: 15px; z-index: 20; position: relative; }
        .toggle-btn, .clear-btn {
            background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 8px 18px; border-radius: 20px; font-size: 0.75rem; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; cursor: pointer; transition: all 0.3s;
        }
        
        .toggle-btn { color: #aaa; }
        .toggle-btn:hover { background: rgba(0, 242, 254, 0.1); border-color: #00f2fe; color: #fff; }
        .toggle-btn.active { background: rgba(0, 242, 254, 0.2); border-color: #00f2fe; color: #00f2fe; box-shadow: 0 0 15px rgba(0, 242, 254, 0.3);}

        .clear-btn { color: #ff0844; border-color: rgba(255, 8, 68, 0.3); }
        .clear-btn:hover { background: rgba(255, 8, 68, 0.15); color: #ff0844; border-color: #ff0844; box-shadow: 0 0 15px rgba(255, 8, 68, 0.4); }

    </style>
</head>
<body>

    <!-- 🌟 Colorful 3D Warp Starfield Canvas -->
    <canvas id="starfield"></canvas>

    <!-- 🎬 Intro Screen -->
    <div id="intro-screen">
        <!-- 🤖 AI Logo -->
        <div class="ai-core-container">
            <div class="ai-core-ring-1"></div>
            <div class="ai-core-ring-2"></div>
            <div class="ai-core-center"></div>
        </div>

        <h1 class="text-4xl md:text-6xl font-extrabold tracking-widest uppercase mb-2 text-center text-gradient glow-text">VEDIKA</h1>
        <p class="text-sm md:text-base tracking-[0.4em] text-gray-400 uppercase mb-12">Intelligent Core</p>
        
        <button id="start-btn" class="start-btn">Start Call</button>
        <p id="connecting-text" class="mt-6 text-[#00f2fe] font-bold tracking-widest hidden animate-pulse">Calling Vedika...</p>
    </div>

    <!-- 📱 Main Interface -->
    <div id="main-interface" class="main-wrapper opacity-0 transition-opacity duration-700">
        
        <!-- Header -->
        <header class="w-full p-5 glass-layer border-t-0 border-l-0 border-r-0 md:rounded-b-3xl flex justify-between items-center">
            <div class="flex items-center gap-4">
                <div class="relative w-8 h-8">
                    <div class="absolute inset-0 border border-[#00f2fe] rounded-full animate-ping opacity-50"></div>
                    <div class="absolute inset-2 bg-[#00f2fe] rounded-full shadow-[0_0_10px_#00f2fe]"></div>
                </div>
                <span class="text-xl font-bold tracking-[0.2em] uppercase text-gradient">Vedika</span>
            </div>
            <div class="text-xs font-bold text-[#00f2fe] uppercase tracking-widest flex items-center gap-2 bg-[#00f2fe]/10 px-3 py-1 rounded-full border border-[#00f2fe]/30">
                <span class="w-2 h-2 rounded-full bg-[#00f2fe] animate-pulse shadow-[0_0_5px_#00f2fe]"></span> Secure
            </div>
        </header>

        <!-- Dynamic Subtitle Area -->
        <main id="chat-container" class="chat-container glass-layer my-4 mx-0 md:mx-6 md:rounded-3xl border-x-0 md:border-x">
            <!-- Messages -->
        </main>

        <!-- Control Area -->
        <footer class="p-6 glass-layer border-b-0 border-l-0 border-r-0 md:rounded-t-3xl flex flex-col justify-center items-center gap-4 relative z-20">
            
            <div class="control-btns-wrapper">
                <button id="subtitle-toggle" class="toggle-btn">Show Subtitles</button>
                <button id="clear-btn" class="clear-btn">Clear History</button>
            </div>

            <div id="status-text" class="status-display opacity-0"></div>

            <div class="relative mt-2 mb-2">
                <button id="mic-btn" class="mic-btn" title="Microphone">
                    <div class="progress-ring"></div>
                    
                    <!-- SVG Mic Icon -->
                    <svg id="mic-icon" class="icon-transition" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3z"></path>
                        <path d="M19 10v2a7 7 0 0 1-14 0v-2"></path>
                        <line x1="12" y1="19" x2="12" y2="22"></line>
                    </svg>

                    <!-- Colorful Waveform Animation (Hidden by default) -->
                    <div id="waveform" class="waveform icon-transition hidden-icon">
                        <div class="bar"></div>
                        <div class="bar"></div>
                        <div class="bar"></div>
                        <div class="bar"></div>
                        <div class="bar"></div>
                    </div>
                </button>
            </div>
            
            <audio id="audio-player" class="hidden" autoplay></audio>
        </footer>
    </div>

    <!-- 🛠️ Core Logic -->
    <script type="module">
        import { Client } from "https://cdn.jsdelivr.net/npm/@gradio/client/dist/index.min.js";

        // UI Elements
        const introScreen = document.getElementById('intro-screen');
        const mainInterface = document.getElementById('main-interface');
        const startBtn = document.getElementById('start-btn');
        const connectingText = document.getElementById('connecting-text');
        
        const micBtn = document.getElementById('mic-btn');
        const micIcon = document.getElementById('mic-icon');
        const waveform = document.getElementById('waveform');
        
        const statusText = document.getElementById('status-text');
        const chatContainer = document.getElementById('chat-container');
        const subtitleToggle = document.getElementById('subtitle-toggle');
        const clearBtn = document.getElementById('clear-btn');
        const audioPlayer = document.getElementById('audio-player');

        // State Variables
        let client;
        let isRecording = false;
        let mediaRecorder;
        let audioChunks = [];
        let audioContext;
        let analyser;
        let microphone;
        let animationFrameId;
        
        // VAD
        let silenceTimer = null;
        let isSpeaking = false;
        const SILENCE_THRESHOLD = 2000; // Exact 2 seconds
        const VOLUME_THRESHOLD = 15; 

        // Physics State for Colorful Stars
        let currentAudioVolume = 0;
        let isWarpSpeed = false;

        // Pure Local History (Stateless Backend Integration)
        let chatHistory = JSON.parse(localStorage.getItem('vedikaPureHistory')) || [];

        // Exact 3-Second Timers
        let thinkingTimer1, thinkingTimer2;

        // Colors for Stars
        const starColors = ['#ffffff', '#00f2fe', '#fe0979', '#ffaa00', '#4facfe'];

        // --- Subtitle Toggle Logic ---
        let showSubtitles = false;
        subtitleToggle.addEventListener('click', () => {
            showSubtitles = !showSubtitles;
            if (showSubtitles) {
                subtitleToggle.innerText = "Hide Subtitles";
                subtitleToggle.classList.add('active');
                chatContainer.classList.add('show-subtitles');
            } else {
                subtitleToggle.innerText = "Show Subtitles";
                subtitleToggle.classList.remove('active');
                chatContainer.classList.remove('show-subtitles');
            }
        });

        // --- Clear History Logic ---
        clearBtn.addEventListener('click', () => {
            chatHistory = [];
            localStorage.removeItem('vedikaPureHistory');
            renderHistory(false);
            
            statusText.style.color = "#ff0844";
            statusText.innerText = "Memory Cleared.";
            statusText.style.opacity = "1";
            setTimeout(() => {
                if(!isRecording && !isWarpSpeed) statusText.style.opacity = "0";
                statusText.style.color = "#00f2fe"; // Reset color
            }, 2000);
        });

        // --- 🌌 Colorful 3D Warp Starfield ---
        const canvas = document.getElementById('starfield');
        const ctx = canvas.getContext('2d');
        let stars = [];
        const numStars = 500;

        function initCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            stars = [];
            for (let i = 0; i < numStars; i++) {
                stars.push({
                    x: (Math.random() - 0.5) * 3000,
                    y: (Math.random() - 0.5) * 3000,
                    z: Math.random() * 2000,
                    color: starColors[Math.floor(Math.random() * starColors.length)]
                });
            }
        }
        initCanvas();
        window.addEventListener('resize', initCanvas);

        function drawStars() {
            ctx.fillStyle = 'rgba(2, 2, 4, 0.3)'; // Creates trail effect
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;

            let speed = isWarpSpeed ? 50 : (1 + (currentAudioVolume / 5));

            stars.forEach(star => {
                star.z -= speed;

                if (star.z <= 0) {
                    star.x = (Math.random() - 0.5) * 3000;
                    star.y = (Math.random() - 0.5) * 3000;
                    star.z = 2000;
                }

                const k = 800 / star.z;
                const px = star.x * k + centerX;
                const py = star.y * k + centerY;
                
                const size = Math.max(0.1, (2000 - star.z) / 700);
                const opacity = Math.min(1, (2000 - star.z) / 1000);

                if (px > 0 && px < canvas.width && py > 0 && py < canvas.height) {
                    ctx.globalAlpha = opacity;
                    ctx.fillStyle = star.color;
                    ctx.beginPath();
                    ctx.arc(px, py, size, 0, Math.PI * 2);
                    ctx.fill();
                }
            });
            requestAnimationFrame(drawStars);
        }
        drawStars();

        // --- 🎬 Intro Flow & API Connection ---
        startBtn.addEventListener('click', async () => {
            startBtn.classList.add('hidden');
            connectingText.classList.remove('hidden');

            try {
                // IMPORTANT: Pointing to your Stateless Backend
                client = await Client.connect("pateltraders55455/Vedika-music-preview");
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                setupAudioVisualizer(stream);
                
                introScreen.classList.add('hidden-screen');
                setTimeout(() => {
                    introScreen.style.display = 'none';
                    mainInterface.classList.remove('opacity-0');
                    mainInterface.classList.add('opacity-100');
                    renderHistory(true);
                    
                    // Instant Mic Activation
                    startRecording(stream); 
                }, 500);

            } catch (error) {
                console.error("Connection Failed:", error);
                connectingText.innerText = "Connection Failed. Please try again.";
                connectingText.style.color = "#ff0844";
                startBtn.classList.remove('hidden');
            }
        });

        function setupAudioVisualizer(stream) {
            audioContext = new (window.AudioContext || window.webkitAudioContext)();
            analyser = audioContext.createAnalyser();
            microphone = audioContext.createMediaStreamSource(stream);
            microphone.connect(analyser);
            analyser.fftSize = 256;
            
            const bufferLength = analyser.frequencyBinCount;
            const dataArray = new Uint8Array(bufferLength);

            function monitorAudio() {
                analyser.getByteFrequencyData(dataArray);
                let sum = 0;
                for(let i = 0; i < bufferLength; i++) { sum += dataArray[i]; }
                currentAudioVolume = sum / bufferLength;

                if (isRecording) {
                    if (currentAudioVolume > VOLUME_THRESHOLD) {
                        isSpeaking = true;
                        clearTimeout(silenceTimer);
                        // Exact 2 second timeout
                        silenceTimer = setTimeout(stopRecordingAndSend, SILENCE_THRESHOLD);
                        statusText.innerText = "Listening...";
                        statusText.style.color = "#00f2fe";
                        statusText.style.opacity = "1";
                    } else if (!isSpeaking) {
                        statusText.style.opacity = "0";
                    }
                } else {
                    currentAudioVolume = 0;
                }

                animationFrameId = requestAnimationFrame(monitorAudio);
            }
            monitorAudio();
        }

        // --- 💬 English Parser & UI Functions ---
        function appendMessage(role, text) {
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${role === 'user' ? 'msg-user' : 'msg-ai'}`;
            msgDiv.innerHTML = text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
            chatContainer.appendChild(msgDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        function renderHistory(isInitial = false) {
            chatContainer.innerHTML = '';
            if (chatHistory.length === 0) {
                appendMessage('ai', "Vedika is live. Please ask anything.");
                if(isInitial) {
                    statusText.innerText = "Vedika is live. Please ask anything.";
                    statusText.style.opacity = "1";
                    setTimeout(() => { if(!isRecording && !isWarpSpeed) statusText.style.opacity = "0"; }, 3500);
                }
            } else {
                chatHistory.forEach(msg => appendMessage(msg.role, msg.content));
            }
        }

        // --- ⚙️ 3-Second Timing Sequence & Morphing ---
        function startThinkingAnimation() {
            isWarpSpeed = true;
            statusText.style.color = "#fe0979"; // Change text color during processing
            
            micIcon.classList.add('hidden-icon');
            waveform.classList.remove('hidden-icon');
            micBtn.style.pointerEvents = 'none';

            // 0 Seconds
            statusText.innerText = "Vedika is thinking...";
            statusText.style.opacity = "1";

            // 3 Seconds
            thinkingTimer1 = setTimeout(() => {
                statusText.innerText = "Analyzing the topic...";
            }, 3000); 

            // 6 Seconds
            thinkingTimer2 = setTimeout(() => {
                statusText.innerText = "Generating response...";
            }, 6000); 
        }

        function stopThinkingAnimation() {
            isWarpSpeed = false;
            statusText.style.color = "#00f2fe"; // Revert text color
            
            clearTimeout(thinkingTimer1);
            clearTimeout(thinkingTimer2);
            
            statusText.style.opacity = "0";
            
            waveform.classList.add('hidden-icon');
            micIcon.classList.remove('hidden-icon');
            micBtn.style.pointerEvents = 'auto';
        }

        // --- 🎤 Recording ---
        micBtn.addEventListener('click', async () => {
            if (isRecording) {
                stopRecordingAndSend();
            } else {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                startRecording(stream);
            }
        });

        async function startRecording(existingStream = null) {
            try {
                if(audioContext && audioContext.state === 'suspended') {
                    await audioContext.resume();
                }

                const stream = existingStream || await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(stream);
                audioChunks = [];

                mediaRecorder.ondataavailable = e => { if (e.data.size > 0) audioChunks.push(e.data); };
                mediaRecorder.onstop = processAudioBlob;

                mediaRecorder.start();
                isRecording = true;
                isSpeaking = false;
                
                micBtn.classList.add('recording');
                silenceTimer = setTimeout(stopRecordingAndSend, 10000); // 10s absolute max if dead silent

            } catch (err) {
                console.error("Mic Error:", err);
                alert("Microphone permission is required.");
            }
        }

        function stopRecordingAndSend() {
            if (!isRecording) return;
            clearTimeout(silenceTimer);
            isRecording = false;
            currentAudioVolume = 0;
            mediaRecorder.stop(); 
            micBtn.classList.remove('recording');
        }

        // --- 🚀 Pure Stateless Backend Process ---
        async function processAudioBlob() {
            const audioBlob = new Blob(audioChunks, { type: 'audio/wav' });
            
            if (audioBlob.size < 1000) {
                statusText.innerText = "Audio too short.";
                statusText.style.opacity = "1";
                setTimeout(() => statusText.style.opacity = "0", 2000);
                return;
            }

            startThinkingAnimation();

            try {
                // NOTE: Using the stateless call (NO HISTORY PASSED)
                const result = await client.predict("/process_all_in_one", {
                    audio_filepath: audioBlob
                });

                const data = result.data;
                if (data && data.length >= 2) {
                    const audioUrl = data[0];
                    const rawLog = data[1]; // e.g. "🗣️ आपने कहा: Hello\n\n🔱 वेदिका: How are you?"

                    // --- Powerful English Parser ---
                    let parsedUserMsg = "Audio input received.";
                    let parsedAiMsg = "Response generated.";
                    
                    if (rawLog) {
                        try {
                            const parts = rawLog.split('🔱 वेदिका:');
                            if (parts.length > 1) {
                                parsedUserMsg = parts[0].replace('🗣️ आपने कहा:', '').trim();
                                parsedAiMsg = parts[1].trim();
                            } else {
                                parsedAiMsg = rawLog.trim();
                            }
                        } catch(e) {
                            console.log("Parsing error", e);
                        }
                    }

                    // Play Audio
                    if (audioUrl) {
                        audioPlayer.src = typeof audioUrl === 'object' ? audioUrl.url : audioUrl;
                        audioPlayer.play();
                    }

                    // Update Local History safely
                    if (parsedUserMsg && parsedAiMsg) {
                        chatHistory.push({ role: "user", content: parsedUserMsg });
                        chatHistory.push({ role: "assistant", content: parsedAiMsg });
                        localStorage.setItem('vedikaPureHistory', JSON.stringify(chatHistory));
                        renderHistory();
                    }
                }
            } catch (error) {
                console.error("API Error:", error);
                appendMessage('ai', "I apologize, there was a technical error.");
            } finally {
                stopThinkingAnimation();
                
                // Auto-Restart listening after audio finishes
                audioPlayer.onended = async () => {
                     setTimeout(async () => {
                         const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                         startRecording(stream);
                     }, 1000); 
                };
            }
        }

    </script>
</body>
</html>
