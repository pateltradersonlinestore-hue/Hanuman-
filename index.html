<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>वेदिका LIVE - स्वदेशी एआई</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 🍎 Premium Apple Glassmorphism & Dark Aesthetic */
        body {
            background-color: #050505;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, sans-serif;
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background: radial-gradient(circle at 10% 20%, rgba(25, 20, 45, 0.6), transparent 40%),
                        radial-gradient(circle at 90% 80%, rgba(40, 20, 10, 0.6), transparent 40%), 
                        url('https://www.transparenttextures.com/patterns/stardust.png'), #000000;
        }

        .glow-text { text-shadow: 0 0 15px rgba(255, 140, 0, 0.8), 0 0 30px rgba(255, 255, 255, 0.4); }

        .glass-panel {
            background: rgba(15, 15, 20, 0.4);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
            border-radius: 24px;
        }

        /* 💬 Chat History Scrollbar */
        .chat-container { 
            flex-grow: 1; 
            overflow-y: auto; 
            padding: 20px; 
            display: flex; 
            flex-direction: column; 
            gap: 20px; 
            scroll-behavior: smooth;
        }
        .chat-container::-webkit-scrollbar { width: 4px; }
        .chat-container::-webkit-scrollbar-thumb { background: rgba(255, 140, 0, 0.5); border-radius: 10px; }

        .message { max-width: 85%; padding: 16px 24px; border-radius: 20px; font-size: 1.05rem; line-height: 1.6; letter-spacing: 0.3px;}
        .msg-user { align-self: flex-end; background: linear-gradient(135deg, rgba(255, 140, 0, 0.15), rgba(255, 140, 0, 0.05)); border: 1px solid rgba(255, 140, 0, 0.3); color: #fff; border-bottom-right-radius: 4px; box-shadow: 0 4px 15px rgba(255, 140, 0, 0.1);}
        .msg-ai { align-self: flex-start; background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.08); color: #e5e5ea; border-bottom-left-radius: 4px; box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);}

        /* 🎛️ Controls */
        .control-area { padding: 25px; background: rgba(5, 5, 10, 0.7); border-top: 1px solid rgba(255, 255, 255, 0.05); display: flex; flex-direction: column; align-items: center; gap: 15px;}
        
        .mic-btn { 
            background: linear-gradient(135deg, #2a2a35, #1a1a25); 
            border: 2px solid rgba(255, 255, 255, 0.1); 
            color: #fff; 
            border-radius: 50%; 
            width: 80px; 
            height: 80px; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            cursor: pointer; 
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .mic-btn:hover { transform: scale(1.05); border-color: rgba(255, 140, 0, 0.5); }
        .mic-btn.recording { 
            background: linear-gradient(135deg, #ff4b4b, #ff0000); 
            border-color: #ff4b4b;
            box-shadow: 0 0 30px rgba(255, 0, 0, 0.5);
            animation: pulse-red 1.5s infinite;
        }
        .mic-btn.processing {
            background: linear-gradient(135deg, #ff8c00, #ffa500);
            border-color: #ff8c00;
            box-shadow: 0 0 30px rgba(255, 140, 0, 0.4);
            animation: spin-pulse 2s infinite linear;
            cursor: not-allowed;
            pointer-events: none;
        }

        @keyframes pulse-red {
            0% { box-shadow: 0 0 0 0 rgba(255, 0, 0, 0.7); }
            70% { box-shadow: 0 0 0 20px rgba(255, 0, 0, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 0, 0, 0); }
        }

        @keyframes spin-pulse {
            0% { transform: scale(1); box-shadow: 0 0 15px rgba(255, 140, 0, 0.5); }
            50% { transform: scale(1.05); box-shadow: 0 0 30px rgba(255, 140, 0, 0.8); }
            100% { transform: scale(1); box-shadow: 0 0 15px rgba(255, 140, 0, 0.5); }
        }

        .status-text {
            font-size: 1rem;
            font-weight: 500;
            letter-spacing: 1px;
            height: 24px;
            transition: opacity 0.3s;
        }

        .clear-btn {
            background: transparent;
            color: gray;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: color 0.3s;
        }
        .clear-btn:hover { color: #ff4b4b; }

    </style>
</head>
<body>

    <!-- 🌟 Top Bar -->
    <header class="w-full p-6 flex justify-between items-center z-10 glass-panel rounded-none border-t-0 border-l-0 border-r-0">
        <div class="flex items-center gap-4">
            <svg width="35" height="35" viewBox="0 0 100 100" fill="none">
                <path d="M50 10 L90 30 L90 70 L50 90 L10 70 L10 30 Z" stroke="url(#orange-grad)" stroke-width="3" fill="rgba(255,140,0,0.1)"/>
                <circle cx="50" cy="50" r="12" fill="#ff8c00" class="animate-pulse"/>
                <defs>
                    <linearGradient id="orange-grad" x1="0" y1="0" x2="100" y2="100">
                        <stop offset="0%" stop-color="#ff8c00" />
                        <stop offset="100%" stop-color="#ffffff" />
                    </linearGradient>
                </defs>
            </svg>
            <div>
                <h1 class="text-xl font-extrabold tracking-[0.15em] uppercase glow-text m-0">वेदिका LIVE</h1>
                <p class="text-[10px] tracking-widest text-gray-400 uppercase font-bold m-0 mt-1">Pioneered by Divy Patel • Bharat 🇮🇳</p>
            </div>
        </div>
        <div id="connection-status" class="text-xs font-bold text-orange-400 uppercase tracking-wider flex items-center gap-2">
            <span class="w-2 h-2 rounded-full bg-orange-400 animate-pulse"></span> Connecting API...
        </div>
    </header>

    <!-- 💬 Chat Area -->
    <main id="chat-container" class="chat-container">
        <!-- Messages will appear here -->
    </main>

    <!-- 🎛️ Bottom Control Area -->
    <footer class="control-area z-10">
        
        <!-- Status Text (Thinking -> Analyzing -> Generating) -->
        <div id="status-text" class="status-text text-orange-400 opacity-0"></div>

        <!-- Big Mic Button -->
        <button id="mic-btn" class="mic-btn" title="Hold or Click to Speak">
            <svg id="mic-icon" width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3z"></path>
                <path d="M19 10v2a7 7 0 0 1-14 0v-2"></path>
                <line x1="12" y1="19" x2="12" y2="22"></line>
            </svg>
        </button>
        
        <p class="text-gray-500 text-xs tracking-wider">टैप करें और बोलें</p>

        <button id="clear-btn" class="clear-btn mt-2">🗑️ स्मृति मिटाएं (Clear Memory)</button>

        <!-- Hidden Audio Player for Autoplay -->
        <audio id="audio-player" class="hidden" autoplay></audio>
    </footer>

    <!-- 🛠️ Core Logic -->
    <script type="module">
        import { Client } from "https://cdn.jsdelivr.net/npm/@gradio/client/dist/index.min.js";

        // UI Elements
        const micBtn = document.getElementById('mic-btn');
        const statusText = document.getElementById('status-text');
        const chatContainer = document.getElementById('chat-container');
        const audioPlayer = document.getElementById('audio-player');
        const connectionStatus = document.getElementById('connection-status');
        const clearBtn = document.getElementById('clear-btn');

        // State
        let client;
        let isRecording = false;
        let mediaRecorder;
        let audioChunks = [];
        let statusInterval;
        
        // 🧠 Persistent History (Local Storage)
        let chatHistory = JSON.parse(localStorage.getItem('vedikaHistory')) || [];

        // Loading Animation Stages
        const thinkingStages = [
            "वेदिका सोच रही है...", 
            "विषय का विश्लेषण कर रही है...", 
            "प्रतिक्रिया उत्पन्न कर रही है..."
        ];

        // --- 1. Initialize API Connection ---
        async function initAPI() {
            try {
                // Connecting to your specified Hugging Face space
                client = await Client.connect("pateltraders55455/Vedika-music-preview");
                connectionStatus.innerHTML = `<span class="w-2 h-2 rounded-full bg-green-500"></span> System Online`;
                connectionStatus.className = "text-xs font-bold text-green-500 uppercase tracking-wider flex items-center gap-2";
                
                // Render existing history
                renderHistory();
            } catch (error) {
                console.error("Connection Failed:", error);
                connectionStatus.innerHTML = `<span class="w-2 h-2 rounded-full bg-red-500"></span> Connection Failed`;
                connectionStatus.className = "text-xs font-bold text-red-500 uppercase tracking-wider flex items-center gap-2";
            }
        }
        initAPI();

        // --- 2. UI Functions ---
        function appendMessage(role, text) {
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${role === 'user' ? 'msg-user' : 'msg-ai'}`;
            // Simple formatting for bold text
            let formattedText = text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
            msgDiv.innerHTML = formattedText;
            chatContainer.appendChild(msgDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        function renderHistory() {
            chatContainer.innerHTML = '';
            if (chatHistory.length === 0) {
                appendMessage('ai', "प्रणाम आदरणीय दिव्य जी! मैं वेदिका हूँ। भारत माता की जय! बताइए आज मैं आपकी क्या सहायता करूँ?");
            } else {
                chatHistory.forEach(msg => {
                    appendMessage(msg.role, msg.content);
                });
            }
        }

        function startThinkingAnimation() {
            let i = 0;
            statusText.innerText = thinkingStages[0];
            statusText.style.opacity = "1";
            micBtn.classList.add('processing');
            
            statusInterval = setInterval(() => {
                i = (i + 1) % thinkingStages.length;
                statusText.innerText = thinkingStages[i];
            }, 1800); // Changes text every 1.8 seconds
        }

        function stopThinkingAnimation() {
            clearInterval(statusInterval);
            statusText.style.opacity = "0";
            micBtn.classList.remove('processing');
        }

        // --- 3. Audio Recording & Processing ---
        micBtn.addEventListener('click', async () => {
            if (!client) {
                alert("कृपया सर्वर कनेक्ट होने की प्रतीक्षा करें...");
                return;
            }

            if (isRecording) {
                // Stop Recording
                mediaRecorder.stop();
                isRecording = false;
                micBtn.classList.remove('recording');
            } else {
                // Start Recording
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    mediaRecorder = new MediaRecorder(stream);
                    audioChunks = [];

                    mediaRecorder.ondataavailable = e => {
                        if (e.data.size > 0) audioChunks.push(e.data);
                    };

                    mediaRecorder.onstop = async () => {
                        // Stop all tracks to release microphone
                        stream.getTracks().forEach(track => track.stop());
                        
                        // Create Blob
                        const audioBlob = new Blob(audioChunks, { type: 'audio/wav' });
                        
                        // Start API Request
                        await sendToVedika(audioBlob);
                    };

                    mediaRecorder.start();
                    isRecording = true;
                    micBtn.classList.add('recording');
                    statusText.innerText = "सुन रही हूँ...";
                    statusText.style.opacity = "1";

                } catch (err) {
                    console.error("Mic Error:", err);
                    alert("माइक्रोफ़ोन की अनुमति आवश्यक है।");
                }
            }
        });

        // --- 4. API Communication ---
        async function sendToVedika(audioBlob) {
            startThinkingAnimation();

            try {
                // The exact call provided by you
                const result = await client.predict("/process_all_in_one", {
                    audio_filepath: audioBlob,
                    history: chatHistory,
                });

                // Assuming result.data gives [audio_url, formatted_text_log, new_history] based on python backend
                const data = result.data;
                
                if (data && data.length >= 3) {
                    const audioUrl = data[0]; // Can be URL or object {url: string}
                    const textLog = data[1];
                    const newHistory = data[2];

                    // Play Audio
                    if (audioUrl) {
                        if (typeof audioUrl === 'object' && audioUrl.url) {
                            audioPlayer.src = audioUrl.url;
                        } else {
                            audioPlayer.src = audioUrl;
                        }
                        audioPlayer.play();
                    }

                    // Update History State & LocalStorage
                    if (newHistory && Array.isArray(newHistory)) {
                        chatHistory = newHistory;
                        localStorage.setItem('vedikaHistory', JSON.stringify(chatHistory));
                        renderHistory();
                    }
                }

            } catch (error) {
                console.error("API Error:", error);
                appendMessage('ai', "क्षमा करें आदरणीय दिव्य जी, तकनीकी बाधा के कारण मैं उत्तर नहीं ला सकी।");
            } finally {
                stopThinkingAnimation();
            }
        }

        // --- 5. Clear Memory Functionality ---
        clearBtn.addEventListener('click', () => {
            if(confirm("क्या आप सुनिश्चित हैं कि आप पिछली सभी बातें मिटाना चाहते हैं?")) {
                chatHistory = [];
                localStorage.removeItem('vedikaHistory');
                renderHistory();
            }
        });

    </script>
</body>
</html>
