<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vedika Live - Continuous AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 🍎 Premium Apple Glassmorphism & Dark Aesthetic */
        body {
            background-color: #000000;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", sans-serif;
            margin: 0;
            height: 100vh;
            overflow: hidden;
            /* Subtle dual-color shade: Deep Navy to dark Teal */
            background: radial-gradient(circle at top left, rgba(20, 25, 45, 0.4), transparent 50%),
                        radial-gradient(circle at bottom right, rgba(0, 30, 40, 0.4), transparent 50%),
                        #000000;
        }

        .glow-text-white {
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.6), 0 0 25px rgba(255, 255, 255, 0.3);
        }

        /* 🚪 Welcome Screen */
        #welcome-screen {
            position: fixed;
            inset: 0;
            background: #000000;
            background: radial-gradient(circle at center, #111 0%, #000 100%);
            z-index: 9999;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: opacity 0.8s ease, visibility 0.8s;
        }

        .btn-premium {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #ffffff;
            padding: 14px 36px;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            backdrop-filter: blur(10px);
        }

        .btn-premium:hover {
            background: rgba(255, 255, 255, 0.9);
            color: #000000;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.4);
            transform: translateY(-2px);
        }

        /* 🔮 The Vedika Live Orb (Large, Orange + White) */
        .orb-container {
            position: relative;
            width: 300px;
            height: 300px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0 auto;
        }

        .orb {
            /* Increased base size */
            width: 170px;
            height: 170px;
            border-radius: 50%;
            /* Orange and White Gradient */
            background: linear-gradient(135deg, #ff7e00, #ffffff, #ffb347);
            filter: blur(12px);
            opacity: 0.8;
            /* Using transform for JS reactive scaling */
            transition: transform 0.1s ease-out, background 0.5s ease;
            box-shadow: 0 0 40px rgba(255, 126, 0, 0.4), inset 0 0 20px rgba(255,255,255,0.8);
            will-change: transform;
        }

        /* State: Processing (Thinking) */
        .orb.processing {
            background: linear-gradient(135deg, #ff9500, #ffcc00);
            opacity: 0.9;
            filter: blur(15px);
            animation: spin-pulse 2s infinite linear;
        }

        /* State: Speaking (Vedika Speaking) */
        .orb.speaking {
            background: linear-gradient(135deg, #ff8c00, #ffffff);
            opacity: 1;
            filter: blur(10px);
            animation: ripple-speak 1.5s infinite;
        }

        @keyframes spin-pulse {
            0% { transform: scale(1) rotate(0deg); }
            50% { transform: scale(1.1) rotate(180deg); }
            100% { transform: scale(1) rotate(360deg); }
        }
        @keyframes ripple-speak {
            0% { box-shadow: 0 0 0 0 rgba(255, 140, 0, 0.6); transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { box-shadow: 0 0 0 50px rgba(255, 140, 0, 0); transform: scale(1); }
        }

        /* 📜 Subtitles Container */
        .subtitles-wrapper {
            position: absolute;
            bottom: 120px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 650px;
            text-align: center;
            opacity: 0;
            visibility: hidden;
            transition: all 0.4s ease;
            z-index: 20;
        }

        .subtitles-wrapper.visible {
            opacity: 1;
            visibility: visible;
        }

        .subtitle-text {
            background: rgba(20, 20, 20, 0.7);
            padding: 18px 28px;
            border-radius: 24px;
            backdrop-filter: blur(15px);
            font-size: 1.15rem;
            line-height: 1.6;
            color: #f5f5f7;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        /* 🎮 Bottom Controls */
        .controls-bar {
            position: fixed;
            bottom: 35px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 20px;
            z-index: 30;
            background: rgba(30, 30, 35, 0.7);
            padding: 12px 24px;
            border-radius: 50px;
            backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 15px 35px rgba(0,0,0,0.4);
        }

        .control-btn {
            background: transparent;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .control-btn:hover { background: rgba(255, 255, 255, 0.15); transform: scale(1.1); }
        .control-btn.active-pause { color: #ffb347; background: rgba(255, 179, 71, 0.15); }
        .control-btn.end-call { color: #ef4444; background: rgba(239, 68, 68, 0.15); }
        .control-btn.end-call:hover { background: rgba(239, 68, 68, 0.3); }

        .hidden-force { display: none !important; }
    </style>
</head>
<body class="flex flex-col relative">

    <!-- 🚪 Welcome Screen -->
    <div id="welcome-screen">
        <!-- 🔱 Unique Abstract Voice AI Logo -->
        <div class="mb-10 relative">
            <svg width="100" height="100" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg" class="drop-shadow-[0_0_20px_rgba(255,140,0,0.6)]">
                <!-- Outer Resonance Rings -->
                <circle cx="50" cy="50" r="48" stroke="url(#paint0_linear)" stroke-opacity="0.3" stroke-width="2"/>
                <circle cx="50" cy="50" r="38" stroke="url(#paint0_linear)" stroke-opacity="0.6" stroke-width="1.5" stroke-dasharray="4 6" class="animate-spin" style="animation-duration: 15s;"/>
                <!-- Inner Neural Wave Core -->
                <path d="M25 50 C 35 20, 65 80, 75 50" stroke="white" stroke-width="4" stroke-linecap="round"/>
                <path d="M25 50 C 35 80, 65 20, 75 50" stroke="#ff8c00" stroke-width="4" stroke-linecap="round"/>
                <circle cx="50" cy="50" r="8" fill="white" class="animate-pulse"/>
                <defs>
                    <linearGradient id="paint0_linear" x1="0" y1="0" x2="100" y2="100" gradientUnits="userSpaceOnUse">
                        <stop stop-color="#ff8c00"/>
                        <stop offset="1" stop-color="#ffffff"/>
                    </linearGradient>
                </defs>
            </svg>
        </div>
        
        <h1 class="text-4xl md:text-6xl font-bold mb-12 glow-text-white text-center px-4 tracking-tight">
            Introducing the New<br>
            <span class="text-transparent bg-clip-text bg-gradient-to-r from-orange-400 to-white">Vedika Live</span>
        </h1>
        
        <button id="start-now-btn" class="btn-premium">
            Start Now <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
        </button>
        
        <p class="absolute bottom-8 text-[10px] tracking-[0.3em] text-gray-500 uppercase font-bold">
            Pioneered by Divy Patel • Bharat 🇮🇳
        </p>
    </div>

    <!-- 🌟 Top Bar -->
    <header class="w-full p-6 flex justify-between items-center z-10">
        <div class="flex items-center gap-3">
            <svg width="24" height="24" viewBox="0 0 100 100" fill="none" class="opacity-90">
                <circle cx="50" cy="50" r="40" stroke="white" stroke-width="6"/>
                <circle cx="50" cy="50" r="15" fill="#ff8c00"/>
            </svg>
            <span class="text-sm font-bold tracking-[0.2em] uppercase text-gray-300">Vedika</span>
        </div>
        <button id="toggle-subtitles-btn" class="text-xs uppercase tracking-wider text-gray-400 border border-gray-600 rounded-full px-5 py-2 hover:text-white hover:border-white transition-colors">
            Show Subtitles
        </button>
    </header>

    <!-- 💬 Main Visual Area -->
    <main class="flex-1 flex flex-col justify-center items-center z-10 relative w-full h-full">
        
        <!-- The Dynamic Large Orange Orb -->
        <div class="orb-container">
            <div id="vedika-orb" class="orb"></div>
        </div>
        
        <div id="orb-status" class="mt-12 text-xs uppercase tracking-[0.4em] text-gray-500 font-bold transition-all">Standby</div>

        <!-- 📜 Subtitles Overlay -->
        <div id="subtitles-container" class="subtitles-wrapper">
            <div id="subtitle-content" class="subtitle-text">
                Waiting for voice input...
            </div>
        </div>

    </main>

    <!-- 🎮 Center Control (Standby) -->
    <div id="standby-controls" class="absolute inset-0 flex items-center justify-center z-20 pointer-events-none">
        <button id="go-live-btn" class="btn-premium pointer-events-auto mt-52">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="22"/></svg>
            Go Live
        </button>
    </div>

    <!-- 🎮 Bottom Controls (Live Mode) -->
    <div id="live-controls" class="controls-bar hidden-force">
        <button id="pause-live-btn" class="control-btn" title="Pause Live">
            <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>
        </button>
        <button id="end-live-btn" class="control-btn end-call" title="End Live">
            <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.68 13.31a16 16 0 0 0 3.41 2.6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7 2 2 0 0 1 1.72 2v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.42 19.42 0 0 1-7-7 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91"/><line x1="23" y1="1" x2="1" y2="23"/></svg>
        </button>
    </div>

    <audio id="vedika-audio" hidden></audio>

    <!-- 🛠️ Core Logic -->
    <script type="module">
        import { Client } from "https://cdn.jsdelivr.net/npm/@gradio/client/dist/index.min.js";

        const welcomeScreen = document.getElementById('welcome-screen');
        const startNowBtn = document.getElementById('start-now-btn');
        const orb = document.getElementById('vedika-orb');
        const orbStatus = document.getElementById('orb-status');
        
        const standbyControls = document.getElementById('standby-controls');
        const goLiveBtn = document.getElementById('go-live-btn');
        const liveControls = document.getElementById('live-controls');
        const pauseLiveBtn = document.getElementById('pause-live-btn');
        const endLiveBtn = document.getElementById('end-live-btn');
        
        const toggleSubtitlesBtn = document.getElementById('toggle-subtitles-btn');
        const subtitlesContainer = document.getElementById('subtitles-container');
        const subtitleContent = document.getElementById('subtitle-content');
        const audioPlayer = document.getElementById('vedika-audio');

        let gradioClient = null;
        let isLiveActive = false;
        let isPaused = false;
        let showSubtitles = false;
        
        let audioContext, analyser, microphone, scriptProcessor;
        let mediaRecorder;
        let audioChunks = [];
        let isUserSpeaking = false;
        let silenceTimer = null;
        let isVedikaSpeaking = false;

        // Cache Logic
        if (localStorage.getItem('vedikaWelcomeSeen') === 'true') {
            welcomeScreen.style.display = 'none';
        }
        startNowBtn.addEventListener('click', () => {
            welcomeScreen.style.opacity = '0';
            setTimeout(() => {
                welcomeScreen.style.display = 'none';
                localStorage.setItem('vedikaWelcomeSeen', 'true');
            }, 800);
        });

        // Background / Tab Switch Protection (Bug Fix)
        document.addEventListener("visibilitychange", () => {
            if (document.hidden) {
                // User left the website tab
                if (!audioPlayer.paused) {
                    audioPlayer.pause(); // Stop voice immediately
                }
                // Automatically pause the live session to prevent background recording
                if (isLiveActive && !isPaused) {
                    pauseLiveBtn.click();
                }
            }
        });

        // Initialize Server
        async function initClient() {
            try {
                orbStatus.innerText = "Connecting...";
                gradioClient = await Client.connect("pateltraders55455/TTS");
                orbStatus.innerText = "Standby";
            } catch (err) {
                orbStatus.innerText = "Connection Failed";
                console.error("Connection error:", err);
            }
        }
        initClient();

        // Subtitles Toggle
        toggleSubtitlesBtn.addEventListener('click', () => {
            showSubtitles = !showSubtitles;
            if (showSubtitles) {
                subtitlesContainer.classList.add('visible');
                toggleSubtitlesBtn.innerText = "Hide Subtitles";
                toggleSubtitlesBtn.classList.replace('text-gray-400', 'text-white');
            } else {
                subtitlesContainer.classList.remove('visible');
                toggleSubtitlesBtn.innerText = "Show Subtitles";
                toggleSubtitlesBtn.classList.replace('text-white', 'text-gray-400');
            }
        });

        function updateSubtitle(text, prefix = "") {
            if (text) {
                const prefixColor = prefix === "Vedika:" ? "text-orange-400" : "text-gray-400";
                subtitleContent.innerHTML = `<span class="font-bold ${prefixColor}">${prefix}</span> ${text}`;
            }
        }

        // Voice Activity Detection & Dynamic Orb Sizing
        async function startVAD() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
                analyser = audioContext.createAnalyser();
                microphone = audioContext.createMediaStreamSource(stream);
                scriptProcessor = audioContext.createScriptProcessor(2048, 1, 1);

                analyser.smoothingTimeConstant = 0.8;
                analyser.fftSize = 1024;
                microphone.connect(analyser);
                analyser.connect(scriptProcessor);
                scriptProcessor.connect(audioContext.destination);

                mediaRecorder = new MediaRecorder(stream);
                mediaRecorder.ondataavailable = e => { if (e.data.size > 0) audioChunks.push(e.data); };
                mediaRecorder.onstop = sendAudioToBackend;

                scriptProcessor.onaudioprocess = function() {
                    if (isPaused || isVedikaSpeaking || !isLiveActive) {
                        // Reset orb scale when not listening
                        if (!isVedikaSpeaking && !orb.className.includes('processing')) {
                            orb.style.transform = `scale(1)`;
                        }
                        return;
                    }

                    const array = new Uint8Array(analyser.frequencyBinCount);
                    analyser.getByteFrequencyData(array);
                    let values = 0;
                    for (let i = 0; i < array.length; i++) { values += array[i]; }
                    const averageVolume = values / array.length;

                    // Dynamic Voice Movement (Scaling Orb based on volume)
                    if (isUserSpeaking) {
                        // Math logic to make it pulse smoothly based on voice intensity
                        const scale = 1 + (averageVolume / 100); 
                        orb.style.transform = `scale(${Math.min(scale, 1.5)})`; // Max scale 1.5
                    }

                    // Volume threshold to detect start of speech
                    if (averageVolume > 15) {
                        if (!isUserSpeaking) {
                            isUserSpeaking = true;
                            audioChunks = [];
                            mediaRecorder.start();
                            
                            // Remove static animation, we use JS transform now
                            orb.className = "orb"; 
                            orbStatus.innerText = "Listening...";
                            updateSubtitle("...", "You:");
                        }
                        clearTimeout(silenceTimer);
                        silenceTimer = setTimeout(handleSilence, 1500);
                    }
                };
            } catch (err) {
                alert("Microphone access is required for Live mode.");
                endLive();
            }
        }

        function handleSilence() {
            if (isUserSpeaking && !isVedikaSpeaking && !isPaused && isLiveActive) {
                isUserSpeaking = false;
                orb.style.transform = `scale(1)`; // Reset size
                orb.className = "orb processing";
                orbStatus.innerText = "Processing...";
                
                // Requested Text Update
                updateSubtitle("Analyzing the command...", "System:");
                
                mediaRecorder.stop();
            }
        }

        function stopVAD() {
            if (scriptProcessor) scriptProcessor.disconnect();
            if (analyser) analyser.disconnect();
            if (microphone) microphone.disconnect();
            if (audioContext) audioContext.close();
            if (mediaRecorder && mediaRecorder.state !== 'inactive') mediaRecorder.stop();
        }

        // Send to Backend
        async function sendAudioToBackend() {
            if (!gradioClient || audioChunks.length === 0) return;
            
            isVedikaSpeaking = true; 
            const audioBlob = new Blob(audioChunks, { type: 'audio/wav' });
            const audioFile = new File([audioBlob], "live_input.wav", { type: 'audio/wav' });

            try {
                const submission = gradioClient.submit("/process_all_in_one", { audio_filepath: audioFile });

                for await (const msg of submission) {
                    if (msg.type === "data" && isLiveActive && !isPaused) {
                        const outputData = msg.data;
                        const audioResult = outputData[0];
                        const textLog = outputData[1];

                        const parts = textLog.split("🔱 वेदिका:");
                        if (parts.length > 1) {
                            updateSubtitle(parts[1].trim(), "Vedika:");
                        }

                        if (audioResult) {
                            orb.className = "orb speaking";
                            orbStatus.innerText = "Speaking...";
                            
                            audioPlayer.src = audioResult.url || audioResult;
                            audioPlayer.play();
                            
                            audioPlayer.onended = () => {
                                if (isLiveActive && !isPaused) {
                                    isVedikaSpeaking = false;
                                    orb.className = "orb";
                                    orb.style.transform = `scale(1)`;
                                    orbStatus.innerText = "Active";
                                    updateSubtitle("Waiting for voice input...");
                                }
                            };
                        }
                    }
                }
            } catch (error) {
                console.error(error);
                orbStatus.innerText = "Error";
                isVedikaSpeaking = false;
                orb.className = "orb";
                updateSubtitle("Connection error occurred.", "System:");
            }
        }

        // Controls
        goLiveBtn.addEventListener('click', () => {
            if (!gradioClient) return alert("Server not connected.");
            isLiveActive = true;
            isPaused = false;
            
            standbyControls.classList.add('hidden-force');
            liveControls.classList.remove('hidden-force');
            
            orb.className = "orb";
            orbStatus.innerText = "Active";
            updateSubtitle("Live session started. Start speaking...");
            
            startVAD();
        });

        pauseLiveBtn.addEventListener('click', () => {
            isPaused = !isPaused;
            if (isPaused) {
                pauseLiveBtn.classList.add('active-pause');
                pauseLiveBtn.innerHTML = `<svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"/></svg>`;
                orb.className = "orb";
                orb.style.transform = `scale(1)`;
                orbStatus.innerText = "Paused";
                audioPlayer.pause();
                updateSubtitle("Session paused. Press play to resume.", "System:");
            } else {
                pauseLiveBtn.classList.remove('active-pause');
                pauseLiveBtn.innerHTML = `<svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>`;
                orbStatus.innerText = "Active";
                if (!isVedikaSpeaking) updateSubtitle("Waiting for voice input...");
            }
        });

        function endLive() {
            isLiveActive = false;
            isVedikaSpeaking = false;
            stopVAD();
            audioPlayer.pause();
            
            liveControls.classList.add('hidden-force');
            standbyControls.classList.remove('hidden-force');
            
            orb.className = "orb";
            orb.style.transform = `scale(1)`;
            orbStatus.innerText = "Standby";
            updateSubtitle("Session ended.", "System:");
            
            isPaused = false;
            pauseLiveBtn.classList.remove('active-pause');
            pauseLiveBtn.innerHTML = `<svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>`;
        }

        endLiveBtn.addEventListener('click', endLive);
    </script>
</body>
</html>
