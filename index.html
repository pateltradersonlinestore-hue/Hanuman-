<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vedika LIVE - Advanced AI Ecosystem</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 🌌 Premium Deep Space Background */
        body {
            margin: 0;
            padding: 0;
            background-color: #030305;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, sans-serif;
            height: 100vh;
            overflow: hidden;
            position: relative;
        }

        /* 🌟 Interactive 3D Canvas */
        #starfield {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        /* 🍎 Glassmorphism Layers */
        .glass-layer {
            position: relative;
            z-index: 10;
            background: rgba(10, 10, 15, 0.4);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.6);
        }

        .glow-text { text-shadow: 0 0 20px rgba(255, 255, 255, 0.5); }
        .glow-accent { text-shadow: 0 0 15px rgba(255, 140, 0, 0.8); }

        .main-wrapper {
            display: flex;
            flex-direction: column;
            height: 100vh;
            max-width: 1200px;
            margin: 0 auto;
        }

        /* 💬 Chat Subtitles (Hidden by default) */
        .chat-container { 
            flex-grow: 1; 
            overflow-y: auto; 
            padding: 20px; 
            display: flex; 
            flex-direction: column; 
            gap: 20px; 
            scroll-behavior: smooth;
            opacity: 0;
            pointer-events: none;
            transform: translateY(20px) scale(0.98);
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .chat-container.show-subtitles {
            opacity: 1;
            pointer-events: auto;
            transform: translateY(0) scale(1);
        }

        .chat-container::-webkit-scrollbar { width: 4px; }
        .chat-container::-webkit-scrollbar-thumb { background: rgba(255, 140, 0, 0.3); border-radius: 10px; }

        .message { max-width: 90%; padding: 16px 24px; border-radius: 20px; font-size: 1.05rem; line-height: 1.6; letter-spacing: 0.3px;}
        @media (min-width: 768px) { .message { max-width: 75%; } }
        
        .msg-user { align-self: flex-end; background: linear-gradient(135deg, rgba(255, 140, 0, 0.15), rgba(255, 140, 0, 0.05)); border: 1px solid rgba(255, 140, 0, 0.3); color: #fff; border-bottom-right-radius: 4px;}
        .msg-ai { align-self: flex-start; background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.08); color: #e5e5ea; border-bottom-left-radius: 4px;}

        /* 🎛️ Mic Controls */
        .mic-btn { 
            background: linear-gradient(135deg, #1f1f2a, #101018); 
            border: 2px solid rgba(255, 255, 255, 0.1); 
            color: #fff; 
            border-radius: 50%; 
            width: 85px; 
            height: 85px; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            cursor: pointer; 
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            position: relative;
        }
        @media (min-width: 768px) { .mic-btn { width: 100px; height: 100px; } }

        .mic-btn:hover { transform: scale(1.05); border-color: rgba(255, 140, 0, 0.5); }
        .mic-btn.recording { 
            background: linear-gradient(135deg, #ff4b4b, #cc0000); 
            border-color: #ff4b4b;
            box-shadow: 0 0 30px rgba(255, 0, 0, 0.5);
            animation: pulse-red 1.5s infinite;
        }
        
        .progress-ring {
            position: absolute;
            top: -5px; left: -5px; right: -5px; bottom: -5px;
            border-radius: 50%;
            border: 2px solid transparent;
            border-top-color: #ff4b4b;
            opacity: 0;
            transition: transform 0.1s linear;
        }
        .mic-btn.recording .progress-ring { opacity: 1; animation: spin 2s linear infinite; }

        @keyframes pulse-red {
            0% { box-shadow: 0 0 0 0 rgba(255, 0, 0, 0.5); }
            70% { box-shadow: 0 0 0 20px rgba(255, 0, 0, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 0, 0, 0); }
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        /* 🎛️ Waveform Animation (Morphing) */
        .waveform {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
            height: 40px;
        }
        .waveform .bar {
            width: 4px;
            background-color: #ff8c00;
            border-radius: 2px;
            animation: bounce 1s infinite ease-in-out;
        }
        .waveform .bar:nth-child(1) { height: 10px; animation-delay: 0s; }
        .waveform .bar:nth-child(2) { height: 20px; animation-delay: 0.2s; }
        .waveform .bar:nth-child(3) { height: 35px; animation-delay: 0.4s; }
        .waveform .bar:nth-child(4) { height: 20px; animation-delay: 0.6s; }
        .waveform .bar:nth-child(5) { height: 10px; animation-delay: 0.8s; }

        @keyframes bounce {
            0%, 100% { transform: scaleY(0.5); }
            50% { transform: scaleY(1.5); box-shadow: 0 0 10px #ff8c00; }
        }

        .icon-transition { transition: opacity 0.3s ease; }
        .hidden-icon { opacity: 0; position: absolute; pointer-events: none; }

        /* 🎬 Screens */
        #intro-screen {
            position: absolute; inset: 0; z-index: 50;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            background: rgba(3, 3, 5, 0.85);
            backdrop-filter: blur(10px);
            transition: opacity 0.5s ease;
        }
        
        .start-btn {
            background: linear-gradient(135deg, #ff8c00, #e67e00);
            color: #000;
            font-weight: 800;
            font-size: 1.2rem;
            letter-spacing: 2px;
            padding: 16px 40px;
            border-radius: 50px;
            border: none;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(255, 140, 0, 0.4);
            transition: all 0.3s;
            text-transform: uppercase;
        }
        .start-btn:hover { transform: translateY(-3px) scale(1.05); box-shadow: 0 15px 40px rgba(255, 140, 0, 0.6); }

        .hidden-screen { opacity: 0; pointer-events: none; }
        
        /* Status Text */
        .status-display {
            font-size: 1.1rem;
            font-weight: 500;
            letter-spacing: 1px;
            height: 28px;
            color: #ff8c00;
            transition: opacity 0.3s;
            text-align: center;
        }

        /* Subtitle Toggle */
        .toggle-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #aaa;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 10px;
        }
        .toggle-btn:hover { background: rgba(255, 255, 255, 0.1); color: #fff; }
        .toggle-btn.active { background: rgba(255, 140, 0, 0.2); border-color: rgba(255, 140, 0, 0.5); color: #ff8c00; }

    </style>
</head>
<body>

    <!-- 🌟 3D Warp Starfield Canvas -->
    <canvas id="starfield"></canvas>

    <!-- 🎬 Intro Screen -->
    <div id="intro-screen">
        <h1 class="text-4xl md:text-6xl font-extrabold tracking-widest uppercase glow-accent mb-2 text-center">VEDIKA</h1>
        <p class="text-sm md:text-base tracking-[0.3em] text-gray-400 uppercase mb-12">Live Ecosystem</p>
        
        <button id="start-btn" class="start-btn">Start Now</button>
        <p id="connecting-text" class="mt-6 text-orange-400 font-bold tracking-widest hidden animate-pulse">Calling Vedika...</p>
    </div>

    <!-- 📱 Main Interface -->
    <div id="main-interface" class="main-wrapper opacity-0 transition-opacity duration-700">
        
        <!-- Header -->
        <header class="w-full p-5 glass-layer border-t-0 border-l-0 border-r-0 md:rounded-b-2xl flex justify-between items-center">
            <div class="flex items-center gap-3">
                <svg width="30" height="30" viewBox="0 0 100 100" fill="none">
                    <circle cx="50" cy="50" r="40" stroke="rgba(255,255,255,0.2)" stroke-width="2"/>
                    <circle cx="50" cy="50" r="12" fill="#ff8c00" class="animate-pulse"/>
                </svg>
                <span class="text-lg font-bold tracking-[0.2em] uppercase glow-text">Vedika</span>
            </div>
            <div id="top-status" class="text-xs font-bold text-green-500 uppercase tracking-wider flex items-center gap-2">
                <span class="w-2 h-2 rounded-full bg-green-500 animate-pulse"></span> Live
            </div>
        </header>

        <!-- Dynamic Subtitle Area -->
        <main id="chat-container" class="chat-container glass-layer my-2 mx-0 md:mx-4 md:rounded-2xl border-x-0 md:border-x">
            <!-- Messages -->
        </main>

        <!-- Control Area -->
        <footer class="p-6 glass-layer border-b-0 border-l-0 border-r-0 md:rounded-t-2xl flex flex-col justify-center items-center gap-4 relative z-20">
            
            <button id="subtitle-toggle" class="toggle-btn">Show Subtitles</button>

            <div id="status-text" class="status-display opacity-0"></div>

            <div class="relative mt-2 mb-2">
                <button id="mic-btn" class="mic-btn" title="Microphone">
                    <div class="progress-ring"></div>
                    
                    <!-- SVG Mic Icon -->
                    <svg id="mic-icon" class="icon-transition" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3z"></path>
                        <path d="M19 10v2a7 7 0 0 1-14 0v-2"></path>
                        <line x1="12" y1="19" x2="12" y2="22"></line>
                    </svg>

                    <!-- Waveform Animation (Hidden by default) -->
                    <div id="waveform" class="waveform icon-transition hidden-icon">
                        <div class="bar"></div>
                        <div class="bar"></div>
                        <div class="bar"></div>
                        <div class="bar"></div>
                        <div class="bar"></div>
                    </div>
                </button>
            </div>
            
            <audio id="audio-player" class="hidden" autoplay></audio>
        </footer>
    </div>

    <!-- 🛠️ Core Logic -->
    <script type="module">
        import { Client } from "https://cdn.jsdelivr.net/npm/@gradio/client/dist/index.min.js";

        // UI Elements
        const introScreen = document.getElementById('intro-screen');
        const mainInterface = document.getElementById('main-interface');
        const startBtn = document.getElementById('start-btn');
        const connectingText = document.getElementById('connecting-text');
        
        const micBtn = document.getElementById('mic-btn');
        const micIcon = document.getElementById('mic-icon');
        const waveform = document.getElementById('waveform');
        
        const statusText = document.getElementById('status-text');
        const chatContainer = document.getElementById('chat-container');
        const subtitleToggle = document.getElementById('subtitle-toggle');
        const audioPlayer = document.getElementById('audio-player');

        // State Variables
        let client;
        let isRecording = false;
        let mediaRecorder;
        let audioChunks = [];
        let audioContext;
        let analyser;
        let microphone;
        let animationFrameId;
        
        // VAD
        let silenceTimer = null;
        let isSpeaking = false;
        const SILENCE_THRESHOLD = 2000; // 2 seconds
        const VOLUME_THRESHOLD = 15; 

        // Physics State for Stars
        let currentAudioVolume = 0;
        let isWarpSpeed = false; // Trigger for 3D forward movement

        // Persistent History
        let chatHistory = JSON.parse(localStorage.getItem('vedikaHistory')) || [];

        // Timers for Status Text
        let thinkingTimer1, thinkingTimer2;

        // --- Subtitle Toggle Logic ---
        let showSubtitles = false;
        subtitleToggle.addEventListener('click', () => {
            showSubtitles = !showSubtitles;
            if (showSubtitles) {
                subtitleToggle.innerText = "Hide Subtitles";
                subtitleToggle.classList.add('active');
                chatContainer.classList.add('show-subtitles');
            } else {
                subtitleToggle.innerText = "Show Subtitles";
                subtitleToggle.classList.remove('active');
                chatContainer.classList.remove('show-subtitles');
            }
        });

        // --- 🌌 3D Warp Starfield Logic ---
        const canvas = document.getElementById('starfield');
        const ctx = canvas.getContext('2d');
        let stars = [];
        const numStars = 600;

        function initCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            stars = [];
            for (let i = 0; i < numStars; i++) {
                stars.push({
                    x: (Math.random() - 0.5) * 3000,
                    y: (Math.random() - 0.5) * 3000,
                    z: Math.random() * 2000
                });
            }
        }
        initCanvas();
        window.addEventListener('resize', initCanvas);

        function drawStars() {
            // Dark trail effect
            ctx.fillStyle = 'rgba(3, 3, 5, 0.3)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;

            // Normal speed based on volume, Warp speed during thinking
            let speed = isWarpSpeed ? 40 : (1 + (currentAudioVolume / 5));

            ctx.fillStyle = '#ffffff';

            stars.forEach(star => {
                star.z -= speed;

                // Reset star if it passes the viewer
                if (star.z <= 0) {
                    star.x = (Math.random() - 0.5) * 3000;
                    star.y = (Math.random() - 0.5) * 3000;
                    star.z = 2000;
                }

                // 3D to 2D projection
                const k = 800 / star.z;
                const px = star.x * k + centerX;
                const py = star.y * k + centerY;
                
                // Opacity & size based on depth
                const size = Math.max(0.1, (2000 - star.z) / 800);
                const opacity = Math.min(1, (2000 - star.z) / 1000);

                if (px > 0 && px < canvas.width && py > 0 && py < canvas.height) {
                    ctx.globalAlpha = opacity;
                    ctx.beginPath();
                    ctx.arc(px, py, size, 0, Math.PI * 2);
                    ctx.fill();
                }
            });
            requestAnimationFrame(drawStars);
        }
        drawStars();

        // --- 🎬 Intro Flow & API Connection ---
        startBtn.addEventListener('click', async () => {
            startBtn.classList.add('hidden');
            connectingText.classList.remove('hidden');

            try {
                client = await Client.connect("pateltraders55455/Vedika-music-preview");
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                setupAudioVisualizer(stream);
                
                introScreen.classList.add('hidden-screen');
                setTimeout(() => {
                    introScreen.style.display = 'none';
                    mainInterface.classList.remove('opacity-0');
                    mainInterface.classList.add('opacity-100');
                    renderHistory(true);
                    
                    // Auto-start recording
                    startRecording(stream); 
                }, 400);

            } catch (error) {
                console.error("Connection Failed:", error);
                connectingText.innerText = "Connection Failed. Please try again.";
                connectingText.classList.replace('text-orange-400', 'text-red-500');
                startBtn.classList.remove('hidden');
            }
        });

        function setupAudioVisualizer(stream) {
            audioContext = new (window.AudioContext || window.webkitAudioContext)();
            analyser = audioContext.createAnalyser();
            microphone = audioContext.createMediaStreamSource(stream);
            microphone.connect(analyser);
            analyser.fftSize = 256;
            
            const bufferLength = analyser.frequencyBinCount;
            const dataArray = new Uint8Array(bufferLength);

            function monitorAudio() {
                analyser.getByteFrequencyData(dataArray);
                let sum = 0;
                for(let i = 0; i < bufferLength; i++) { sum += dataArray[i]; }
                currentAudioVolume = sum / bufferLength;

                if (isRecording) {
                    if (currentAudioVolume > VOLUME_THRESHOLD) {
                        isSpeaking = true;
                        clearTimeout(silenceTimer);
                        silenceTimer = setTimeout(stopRecordingAndSend, SILENCE_THRESHOLD);
                        statusText.innerText = "Listening...";
                        statusText.style.opacity = "1";
                    } else if (!isSpeaking) {
                        statusText.style.opacity = "0";
                    }
                } else {
                    currentAudioVolume = 0;
                }

                animationFrameId = requestAnimationFrame(monitorAudio);
            }
            monitorAudio();
        }

        // --- 💬 Chat Functions ---
        function appendMessage(role, text) {
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${role === 'user' ? 'msg-user' : 'msg-ai'}`;
            msgDiv.innerHTML = text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
            chatContainer.appendChild(msgDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        function renderHistory(isInitial = false) {
            chatContainer.innerHTML = '';
            if (chatHistory.length === 0) {
                appendMessage('ai', "Vedika is live. Please ask anything.");
                if(isInitial) {
                    statusText.innerText = "Vedika is live. Please ask anything.";
                    statusText.style.opacity = "1";
                    setTimeout(() => { if(!isRecording) statusText.style.opacity = "0"; }, 3000);
                }
            } else {
                chatHistory.forEach(msg => appendMessage(msg.role, msg.content));
            }
        }

        // --- ⚙️ Morphing & Timing State ---
        function startThinkingAnimation() {
            // 1. Activate Warp Speed Stars
            isWarpSpeed = true;
            
            // 2. Morph Mic to Waveform
            micIcon.classList.add('hidden-icon');
            waveform.classList.remove('hidden-icon');
            micBtn.style.pointerEvents = 'none';

            // 3. Exact 3-second timing sequence
            statusText.innerText = "Vedika is thinking...";
            statusText.style.opacity = "1";

            thinkingTimer1 = setTimeout(() => {
                statusText.innerText = "Analyzing the topic...";
            }, 3000); // After 3 seconds

            thinkingTimer2 = setTimeout(() => {
                statusText.innerText = "Generating the response...";
            }, 6000); // After 6 seconds (3s after analyzing)
        }

        function stopThinkingAnimation() {
            isWarpSpeed = false;
            
            clearTimeout(thinkingTimer1);
            clearTimeout(thinkingTimer2);
            
            statusText.style.opacity = "0";
            
            // Revert Waveform to Mic
            waveform.classList.add('hidden-icon');
            micIcon.classList.remove('hidden-icon');
            micBtn.style.pointerEvents = 'auto';
        }

        // --- 🎤 Recording ---
        micBtn.addEventListener('click', async () => {
            if (isRecording) {
                stopRecordingAndSend();
            } else {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                startRecording(stream);
            }
        });

        async function startRecording(existingStream = null) {
            try {
                if(audioContext && audioContext.state === 'suspended') {
                    await audioContext.resume();
                }

                const stream = existingStream || await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(stream);
                audioChunks = [];

                mediaRecorder.ondataavailable = e => { if (e.data.size > 0) audioChunks.push(e.data); };
                mediaRecorder.onstop = processAudioBlob;

                mediaRecorder.start();
                isRecording = true;
                isSpeaking = false;
                
                micBtn.classList.add('recording');
                
                // Fallback timeout
                silenceTimer = setTimeout(stopRecordingAndSend, 10000);

            } catch (err) {
                console.error("Mic Error:", err);
                alert("Microphone permission is required.");
            }
        }

        function stopRecordingAndSend() {
            if (!isRecording) return;
            clearTimeout(silenceTimer);
            isRecording = false;
            currentAudioVolume = 0;
            mediaRecorder.stop(); 
            micBtn.classList.remove('recording');
        }

        // --- 🚀 Process & Send ---
        async function processAudioBlob() {
            const audioBlob = new Blob(audioChunks, { type: 'audio/wav' });
            
            if (audioBlob.size < 1000) {
                statusText.innerText = "Audio too short.";
                statusText.style.opacity = "1";
                setTimeout(() => statusText.style.opacity = "0", 2000);
                return;
            }

            startThinkingAnimation();

            try {
                const result = await client.predict("/process_all_in_one", {
                    audio_filepath: audioBlob,
                    history: chatHistory,
                });

                const data = result.data;
                if (data && data.length >= 3) {
                    const audioUrl = data[0];
                    const newHistory = data[2];

                    if (audioUrl) {
                        audioPlayer.src = typeof audioUrl === 'object' ? audioUrl.url : audioUrl;
                        audioPlayer.play();
                    }

                    if (newHistory && Array.isArray(newHistory)) {
                        chatHistory = newHistory;
                        localStorage.setItem('vedikaHistory', JSON.stringify(chatHistory));
                        renderHistory();
                    }
                }
            } catch (error) {
                console.error("API Error:", error);
                appendMessage('ai', "I apologize, there was a technical error.");
            } finally {
                stopThinkingAnimation();
                
                audioPlayer.onended = async () => {
                     setTimeout(async () => {
                         const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                         startRecording(stream);
                     }, 1000); 
                };
            }
        }

    </script>
</body>
</html>
